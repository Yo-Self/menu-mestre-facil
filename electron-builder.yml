appId: com.menumestre.facil
productName: Gestor Menu
directories:
  output: release
  buildResources: resources
files:
  - "out"
asarUnpack:
  - resources/**
win:
  icon: resources/icon.png
  target:
    - nsis
  executableName: menu-mestre-facil
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: Gestor Menu
  uninstallDisplayName: Gestor Menu
  createDesktopShortcut: always
mac:
  category: public.app-category.business
  # Assinatura: usa o certificado "Developer ID Application" do Keychain (local) ou CSC_LINK (CI)
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # zip é obrigatório para o electron-updater no macOS
  target:
    - dmg
    - zip
  extendInfo:
    NSCameraUsageDescription: O aplicativo precisa de acesso à câmera para ler QR Codes.
    NSDocumentsFolderUsageDescription: O aplicativo solicita acesso para salvar arquivos de relatórios.
  # Notarização via APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID (CI ou local)
  notarize: true
dmg:
  artifactName: ${productName}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: menumestrefacil.com
  category: Office
appImage:
  artifactName: ${productName}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: Yo-Self
  repo: menu-mestre-facil
  releaseType: release
