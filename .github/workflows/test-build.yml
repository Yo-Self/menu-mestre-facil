name: Test Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      NODE_ENV: production
      GITHUB_ACTIONS: true
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Cache node_modules
      uses: actions/cache@v3
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
        
    - name: Install dependencies
      run: |
        npm config set fetch-retries 5
        npm config set fetch-retry-mintimeout 20000
        npm config set fetch-retry-maxtimeout 120000
        npm ci
      env:
        NODE_ENV: development
        ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      
    - name: Build with base path
      run: npm run build:gh-pages
      env:
        VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
        VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        VITE_SENTRY_RELEASE: test-build
      
    - name: Check build output
      run: |
        echo "Build completed successfully!"
        ls -la dist/
        echo "index.html exists:" 
        test -f dist/index.html && echo "✓ Yes" || echo "✗ No"
        echo "CSS files:"
        find dist -name "*.css" | head -5
        echo "JS files:"
        find dist -name "*.js" | head -5
