name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      NODE_ENV: production
      GITHUB_ACTIONS: true
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Cache node_modules
      uses: actions/cache@v3
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
        
    - name: Install dependencies
      run: |
        npm config set fetch-retries 5
        npm config set fetch-retry-mintimeout 20000
        npm config set fetch-retry-maxtimeout 120000
        npm ci
      env:
        NODE_ENV: development
        ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      
    - name: Build with base path
      run: npm run build
      env:
        VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      continue-on-error: true
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'
      continue-on-error: true
        
    - name: Verify build output (fallback for local testing)
      run: |
        echo "Build completed successfully!"
        ls -la dist/
        echo "index.html exists:" 
        test -f dist/index.html && echo "✓ Yes" || echo "✗ No"
        echo "Build artifacts summary:"
        find dist -type f -name "*.css" -o -name "*.js" | wc -l | xargs echo "Found files:"

  deploy:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.actor != 'nektos/act')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
  # Notification job - Success
  notify-success:
    needs: [build, deploy]
    if: always() && (needs.build.result == 'success' && needs.deploy.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Send success notification to CI/CD tab
        run: |
          # Primeiro, tenta enviar para o chat_id atual
          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "message_thread_id": 2,
              "text": "🤖 Menu Mestre Fácil **GitHub Actions - Deploy Next.js**\n\n📋 **Status:** ✅ Sucesso\n\n🌿 **Branch:** ${{ github.ref_name }}\n\n📝 **Detalhes:** Build e deploy concluídos com sucesso! O site foi publicado no GitHub Pages.\n\n🔗 **Ver execução:** [Deploy Next.js](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n⏰ **Executado em:** ${{ github.event.head_commit.timestamp || github.event.schedule || 'Agora' }}",
              "parse_mode": "Markdown"
            }')
          
          # Se falhar com erro de supergrupo, usa o migrate_to_chat_id
          if echo "$RESPONSE" | grep -q "migrate_to_chat_id"; then
            echo "🔄 Chat foi convertido para supergrupo, usando migrate_to_chat_id..."
            MIGRATE_ID=$(echo "$RESPONSE" | grep -o '"migrate_to_chat_id":[^,]*' | cut -d':' -f2 | tr -d ' }')
            echo "📱 Usando chat_id: $MIGRATE_ID"
            
            # Envia a mensagem com o chat_id correto
            curl -X POST \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -H "Content-Type: application/json" \
              -d '{
                "chat_id": '$MIGRATE_ID',
                "message_thread_id": 2,
                "text": "🤖 Menu Mestre Fácil **GitHub Actions - Deploy Next.js**\n\n📋 **Status:** ✅ Sucesso\n\n🌿 **Branch:** ${{ github.ref_name }}\n\n📝 **Detalhes:** Build e deploy concluídos com sucesso! O site foi publicado no GitHub Pages.\n\n🔗 **Ver execução:** [Deploy Next.js](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n⏰ **Executado em:** ${{ github.event.head_commit.timestamp || github.event.schedule || 'Agora' }}",
                "parse_mode": "Markdown"
              }'
          else
            echo "✅ Notificação enviada com sucesso!"
            echo "$RESPONSE"
          fi
            # Notification job - Failure

  notify-failure:
    needs: [build, deploy]
    if: always() && (needs.build.result == 'failure' || needs.deploy.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification to CI/CD tab
        run: |
          # Primeiro, tenta enviar para o chat_id atual
          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "message_thread_id": 2,
              "text": "🤖 Menu Mestre Fácil **GitHub Actions - Deploy Next.js**\n\n📋 **Status:** ❌ Falha\n\n🌿 **Branch:** ${{ github.ref_name }}\n\n📝 **Detalhes:** Falha no build ou deploy. Verifique os logs para mais detalhes.\n\n🔗 **Ver execução:** [Deploy Next.js](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n⏰ **Executado em:** ${{ github.event.head_commit.timestamp || github.event.schedule || 'Agora' }}",
              "parse_mode": "Markdown"
            }')
          
          # Se falhar com erro de supergrupo, usa o migrate_to_chat_id
          if echo "$RESPONSE" | grep -q "migrate_to_chat_id"; then
            echo "🔄 Chat foi convertido para supergrupo, usando migrate_to_chat_id..."
            MIGRATE_ID=$(echo "$RESPONSE" | grep -o '"migrate_to_chat_id":[^,]*' | cut -d':' -f2 | tr -d ' }')
            echo "📱 Usando chat_id: $MIGRATE_ID"
            
            # Envia a mensagem com o chat_id correto
            curl -X POST \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -H "Content-Type: application/json" \
              -d '{
                "chat_id": '$MIGRATE_ID',
                "message_thread_id": 2,
                "text": "🤖 Menu Mestre Fácil **GitHub Actions - Deploy Next.js**\n\n📋 **Status:** ❌ Falha\n\n🌿 **Branch:** ${{ github.ref_name }}\n\n📝 **Detalhes:** Falha no build ou deploy. Verifique os logs para mais detalhes.\n\n🔗 **Ver execução:** [Deploy Next.js](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n⏰ **Executado em:** ${{ github.event.head_commit.timestamp || github.event.schedule || 'Agora' }}",
                "parse_mode": "Markdown"
              }'
          else
            echo "✅ Notificação enviada com sucesso!"
            echo "$RESPONSE"
          fi