name: Desktop Build & Release

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.output-version.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Git configuration
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Bump version
        id: bump
        run: |
          npm version patch -m "chore(release): bump version to %s [skip ci]"

      - name: Push changes and tag
        run: |
          git push origin main
          git push origin --tags

      - name: Get current tag name
        id: output-version
        run: |
          TAG_NAME=$(git describe --tags --abbrev=0)
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

  build:
    needs: bump-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.electron-builder-cache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache Electron and builder downloads
        uses: actions/cache@v4
        with:
          path: |
            .electron-cache
            .electron-builder-cache
          key: electron-builder-${{ matrix.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-builder-${{ matrix.os }}-

      - name: Install dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt ${attempt}/3), retrying in 15s..."
            sleep 15
          done
          exit 1

      - name: Build production bundle
        run: npm run build:desktop

      - name: Package Electron app (${{ matrix.platform }})
        shell: bash
        run: |
          package_with_retry() {
            local args=("$@")
            for attempt in 1 2 3; do
              npx electron-builder "${args[@]}" --publish never && return 0
              echo "electron-builder failed (attempt ${attempt}/3), retrying in 30s..."
              sleep 30
            done
            return 1
          }

          if [ "${{ matrix.platform }}" = "linux" ]; then
            package_with_retry --linux deb
            package_with_retry --linux AppImage || echo "AppImage build failed after retries; continuing with deb artifact"
          else
            package_with_retry --${{ matrix.platform }}
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/*.yml
          if-no-files-found: error
          retention-days: 7

  publish-release:
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifact-staging
          pattern: electron-*
          merge-multiple: true

      - name: Consolidate artifacts into release/
        run: |
          mkdir -p release
          find artifact-staging -type f \( \
            -iname '*.exe' -o -iname '*.dmg' -o -iname '*.zip' -o \
            -iname '*.AppImage' -o -iname '*.deb' -o \
            -iname '*.blockmap' -o -iname '*.yml' -o -iname '*.yaml' \
          \) -exec cp -f {} release/ \;
          echo "Release files:"
          ls -la release/
          if [ -z "$(ls -A release)" ]; then
            echo "No distributable artifacts found to publish"
            exit 1
          fi

      - name: Publish to GitHub Releases
        run: |
          shopt -s nullglob
          artifacts=(release/*)
          npx electron-builder publish -f "${artifacts[@]}" -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
